eyebrow:
  type: text
  comment: Short tag label displayed above the heading.
heading:
  type: text
  comment: Section heading.
testimonials:
  type: array
  comment: Testimonial cards shown in a 1–3 column responsive grid.
  options:
    structures: _structures.testimonialGridItems
colorScheme:
  type: select
  options:
    values:
      - id: inherit
        name: Inherit
      - id: light
        name: Light
      - id: dark
        name: Dark
backgroundColor:
  type: select
  options:
    values:
      - id: none
        name: None
      - id: base
        name: Base
      - id: surface
        name: Surface
      - id: accent
        name: Accent
      - id: highlight
        name: Highlight
